<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek 简洁版</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
        #chat { height: 400px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .user { text-align: right; color: blue; margin: 10px; }
        .ai { text-align: left; color: green; margin: 10px; }
        input { width: 70%; padding: 8px; }
        button { padding: 8px 16px; margin-left: 5px; }
        .api-config { margin-bottom: 10px; }
        #apiKey { width: 60%; }
        .status { font-size: 12px; color: gray; }
    </style>
</head>
<body>
    <h1>DeepSeek AI 助手</h1>
    
    <div class="api-config">
        <input type="password" id="apiKey" placeholder="输入 API Key">
        <button onclick="saveKey()">保存 Key</button>
        <button onclick="clearChat()">清空对话</button>
        <div class="status" id="status"></div>
    </div>
    
    <div id="chat"></div>
    
    <div>
        <input type="text" id="message" placeholder="输入消息..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">发送</button>
    </div>

    <script>
        // 初始化
        let messages = [];
        
        // 加载保存的 Key
        const savedKey = localStorage.getItem('deepseek_key');
        if(savedKey) {
            document.getElementById('apiKey').value = savedKey;
            showStatus('API Key 已加载');
        }
        
        // 加载历史消息
        const savedMsg = localStorage.getItem('chat_history');
        if(savedMsg) {
            messages = JSON.parse(savedMsg);
            displayMessages();
        }
        
        function saveKey() {
            const key = document.getElementById('apiKey').value.trim();
            if(key) {
                localStorage.setItem('deepseek_key', key);
                showStatus('保存成功！');
            } else {
                showStatus('请输入 API Key', 'error');
            }
        }
        
        function clearChat() {
            messages = [];
            localStorage.removeItem('chat_history');
            document.getElementById('chat').innerHTML = '';
            showStatus('对话已清空');
        }
        
        function showStatus(msg, isError) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = msg;
            statusDiv.style.color = isError ? 'red' : 'green';
            setTimeout(() => {
                if(statusDiv.textContent === msg) statusDiv.textContent = '';
            }, 2000);
        }
        
        function displayMessages() {
            const chatDiv = document.getElementById('chat');
            chatDiv.innerHTML = '';
            for(let msg of messages) {
                const div = document.createElement('div');
                div.className = msg.role === 'user' ? 'user' : 'ai';
                div.innerHTML = `<strong>${msg.role === 'user' ? '我' : 'AI'}:</strong> ${msg.content}`;
                chatDiv.appendChild(div);
            }
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        async function send() {
            // 获取 API Key
            const apiKey = localStorage.getItem('deepseek_key');
            if(!apiKey) {
                showStatus('请先保存 API Key', true);
                return;
            }
            
            // 获取消息
            const input = document.getElementById('message');
            const question = input.value.trim();
            if(!question) return;
            
            // 清空输入框
            input.value = '';
            
            // 添加用户消息
            messages.push({role: 'user', content: question});
            displayMessages();
            
            // 保存历史
            localStorage.setItem('chat_history', JSON.stringify(messages));
            
            // 显示加载状态
            const sendBtn = document.querySelector('button[onclick="send()"]');
            const originalText = sendBtn.textContent;
            sendBtn.textContent = '思考中...';
            sendBtn.disabled = true;
            
            // 添加临时消息
            const chatDiv = document.getElementById('chat');
            const tempDiv = document.createElement('div');
            tempDiv.className = 'ai';
            tempDiv.innerHTML = '<strong>AI:</strong> ●●●';
            chatDiv.appendChild(tempDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            try {
                // 调用 API
                console.log('发送请求...');
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: messages.slice(-10), // 只发送最近10条
                        stream: false
                    })
                });
                
                console.log('响应状态:', response.status);
                
                if(!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                // 移除临时消息
                tempDiv.remove();
                
                // 添加真实回复
                messages.push({role: 'assistant', content: reply});
                displayMessages();
                localStorage.setItem('chat_history', JSON.stringify(messages));
                
            } catch(error) {
                console.error('详细错误:', error);
                tempDiv.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'ai';
                errorDiv.innerHTML = `<strong>AI:</strong> ❌ 错误: ${error.message}<br><br>解决方法:<br>1. 检查 API Key 是否正确<br>2. 安装 CORS 插件<br>3. 检查网络连接`;
                chatDiv.appendChild(errorDiv);
                chatDiv.scrollTop = chatDiv.scrollHeight;
                showStatus(error.message, true);
            } finally {
                sendBtn.textContent = originalText;
                sendBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
