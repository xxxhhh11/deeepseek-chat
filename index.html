<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek AI 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .api-config {
            padding: 15px 20px;
            background: #f7f9fc;
            border-bottom: 1px solid #e1e8ed;
        }

        .api-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .api-input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 14px;
        }

        .save-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .save-btn:hover {
            background: #218838;
        }

        .status {
            font-size: 12px;
            color: #28a745;
            margin-top: 5px;
        }

        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .user .message-content {
            background: #4a90e2;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-content pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message-content code {
            background: #f4f4f4;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e1e8ed;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #d0d7de;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #4a90e2;
        }

        .send-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .send-btn:hover {
            background: #357abd;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .clear-btn {
            background: #dc3545;
            margin-top: 10px;
            margin-left: 10px;
        }

        .typing {
            display: inline-block;
            width: 20px;
            text-align: center;
        }

        .typing span {
            animation: blink 1.4s infinite;
            animation-fill-mode: both;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0; }
            30% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 DeepSeek AI 助手</h1>
            <p>由 DeepSeek API 提供支持</p >
        </div>

        <div class="api-config">
            <div class="api-input-group">
                <input type="password" id="apiKey" placeholder="输入你的 DeepSeek API Key" autocomplete="off">
                <button class="save-btn" onclick="saveApiKey()">保存</button>
                <button class="save-btn clear-btn" onclick="clearChat()">清空对话</button>
            </div>
            <div id="status" class="status"></div>
        </div>

        <div id="chatContainer" class="chat-container">
            <div class="message assistant">
                <div class="message-content">
                    你好！我是 DeepSeek AI 助手。<br>
                    请先在上方输入你的 API Key 并保存，然后就可以开始对话了！
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

        let isWaiting = false;

                showStatus('API Key 已加载', 'success');
            }

                try {
